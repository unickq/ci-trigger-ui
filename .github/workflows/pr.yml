name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:

permissions:
  checks: write
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install
      - run: npm run lint
      - run: npm test
      - uses: dorny/test-reporter@v3
        if: ${{ !cancelled() }}
        with:
          name: tests-results
          path: test-results.xml
          reporter: jest-junit
          use-actions-summary: false
